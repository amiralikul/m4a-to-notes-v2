name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURSO_DATABASE_URL: file:./ci.db
  TRIAL_COOKIE_SECRET: ci-trial-cookie-secret
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
  CLERK_SECRET_KEY: sk_test_ci

jobs:
  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type-check
        run: npm run type-check

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (without DB migrations)
        run: npx next build

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    environment: Preview
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      M4A_TO_NOTES_READ_WRITE_TOKEN: ${{ secrets.M4A_TO_NOTES_READ_WRITE_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TRANSCRIPTION_PROVIDER: groq
      SUMMARY_MODEL: gpt-5-mini
      SUMMARY_PROVIDER: openai
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
      TRIAL_COOKIE_SECRET: ${{ secrets.TRIAL_COOKIE_SECRET }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$TURSO_DATABASE_URL" ] && missing="$missing STAGING_TURSO_DATABASE_URL"
          [ -z "$M4A_TO_NOTES_READ_WRITE_TOKEN" ] && missing="$missing M4A_TO_NOTES_READ_WRITE_TOKEN"
          [ -z "$OPENAI_API_KEY" ] && missing="$missing OPENAI_API_KEY"
          [ -z "$GROQ_API_KEY" ] && missing="$missing GROQ_API_KEY"
          [ -z "$INNGEST_SIGNING_KEY" ] && missing="$missing INNGEST_SIGNING_KEY"
          [ -z "$INNGEST_EVENT_KEY" ] && missing="$missing INNGEST_EVENT_KEY"
          [ -z "$TRIAL_COOKIE_SECRET" ] && missing="$missing TRIAL_COOKIE_SECRET"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Start Inngest dev server
        run: npx inngest-cli@latest dev &

      - name: Start Next.js dev server
        run: npm run dev &

      - name: Wait for Inngest to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8288 > /dev/null 2>&1; do sleep 2; done' \
            || { echo "::error::Inngest dev server failed to start within 60 seconds"; exit 1; }

      - name: Wait for Next.js to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do sleep 2; done' \
            || { echo "::error::Next.js failed to start within 60 seconds"; exit 1; }

      - name: Run integration tests
        run: npx vitest run --config e2e/vitest.config.ts
